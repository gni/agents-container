services:
  isolation-dind:
    build:
      context: .
      dockerfile: docker/host/Dockerfile.dind
    container_name: isolation-dind-host
    runtime: runc  # Force standard container runtime instead of host's default
    privileged: true  # Required for Docker-in-Docker to run, create bridge interfaces, and mount cgroups
    ports:
      # Map ports from the inner Docker network to the host machine
      - "8080:8080/tcp"  # Control Plane bind
      - "8053:53/udp"    # DNS UDP bind
      - "8053:53/tcp"    # DNS TCP bind
      - "8081:80/tcp"    # HTTP proxy bind
      - "8443:443/tcp"   # SNI proxy bind
    volumes:
      # Persist inner Docker images, containers, and layers for fast subsequent startup
      - dind-storage:/var/lib/docker
      # Mount the whole project directory from host to let users update files dynamically
      - .:/app
    environment:
      - GVISOR_DEBUG=${GVISOR_DEBUG:-true}
      - OTTERGATE_STREAM_CONTAINER_LOGS=${OTTERGATE_STREAM_CONTAINER_LOGS:-false}
      - OTTERGATE_STREAM_GVISOR_LOGS=${OTTERGATE_STREAM_GVISOR_LOGS:-true}
      - OTTERGATE_LOG_CONTAINER_STDOUT=${OTTERGATE_LOG_CONTAINER_STDOUT:-false}
    restart: unless-stopped

volumes:
  dind-storage:
